services:
  db:
    image: postgres:16-alpine
    container_name: ai_marketing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_marketing
      POSTGRES_PASSWORD: ai_marketing_pass
      POSTGRES_DB: ai_marketing
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
